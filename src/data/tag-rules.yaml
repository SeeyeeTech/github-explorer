# 报告标签提取规则
#
# 每条规则：tag = 标签名（kebab-case），match = 命中关键词列表（小写匹配）
# 关键词会在每篇报告的 [title + summary + highlights + originalUrl] 中查找。
# 一篇报告可命中多个标签；都没命中则归入 uncategorized。


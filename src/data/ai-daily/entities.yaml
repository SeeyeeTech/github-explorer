# AI 实体白名单 + AI 相关性启发式
#
# 用途：
#   - 篇B ai-daily-frontier：per-handle 定向采集各实体官方动态（blog/github/hf/x）
#   - 篇A ai-daily-ecosystem：collect_daily_facts.py 的 is_ai_repo() 据 heuristics 判定
#     一个 trending/starred 仓库是否 AI 相关；命中 entities[].github 的 owner 直接判 AI
#
# 维护：直接编辑本文件即可，无需改代码。新增实体加到对应 category；
#       调整 AI 判定灵敏度改 heuristics.keywords / owners。
version: 1

# ----------------------------------------------------------------- AI 相关性启发式
heuristics:
  # 命中以下任一关键词（在仓库 name / description 里，大小写不敏感）即判 AI 相关
  keywords:
    - llm
    - large language model
    - large-language-model
    - gpt
    - chatgpt
    - claude
    - gemini
    - llama
    - qwen
    - deepseek
    - mistral
    - transformer
    - diffusion
    - stable diffusion
    - agent
    - agentic
    - multi-agent
    - rag
    - retrieval-augmented
    - embedding
    - vector database
    - vector db
    - fine-tun
    - fine tun
    - inference
    - prompt
    - mcp
    - model context protocol
    - neural
    - deep learning
    - machine learning
    - ml
    - genai
    - generative ai
    - text-to-image
    - text-to-video
    - text to speech
    - speech-to-text
    - tts
    - asr
    - copilot
    - openai
    - anthropic
    - huggingface
    - hugging face
    - langchain
    - llamaindex
    - vllm
    - ollama
    - pytorch
    - tensorflow
    - cuda
    - nlp
    - computer vision
    - reinforcement learning
    - rlhf
    - foundation model
    - vlm
    - vision language
    - moe
    - mixture of experts
    - 大模型
    - 大语言模型
    - 智能体
    - 人工智能
    - 机器学习
    - 深度学习
    - 多模态
  # 仓库 owner（小写）落在这些组织里直接判 AI（即便 description 没命中关键词）
  owners:
    - openai
    - anthropics
    - google-deepmind
    - googleapis
    - meta-llama
    - facebookresearch
    - huggingface
    - mistralai
    - qwenlm
    - deepseek-ai
    - microsoft
    - nvidia
    - vllm-project
    - ollama
    - langchain-ai
    - run-llama
    - comfyanonymous
    - lm-sys
    - modelscope
    - 01-ai
    - thudm
    - black-forest-labs
    - stability-ai
    - xai-org
  # AI 高频语言（弱信号：仅在已命中 keyword 时用于排序加权，不单独判定）
  languages:
    - Python
    - Jupyter Notebook
    - Cuda


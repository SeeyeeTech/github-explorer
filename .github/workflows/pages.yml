name: Build & Deploy GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - "src/analysis_report/**"
      - "src/trending_repo/**"
      - "src/starred_repo/**"
      - "src/publish.md"
      - "src/data/**"
      - "site/**"
      - "scripts/**"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python deps
        run: pip install pyyaml

      - name: Refresh metadata (reports.json / tags.yaml / starred.json)
        run: |
          python3 scripts/build_reports_index.py
          python3 scripts/extract_tags.py
          python3 scripts/parse_starred.py

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: site/package-lock.json

      - name: Install site deps
        working-directory: site
        # 用 npm install 而非 ci：Astro / Sharp 的 Linux 平台 optional deps
        # 在 macOS 上跑 npm install 时不会被解析进 lock；CI 上 npm ci 会因
        # 缺 @emnapi/runtime 等 transitive deps 报错。install 容忍。
        run: npm install --no-fund --no-audit --include=optional

      - name: Build site
        working-directory: site
        env:
          SITE_URL: ${{ vars.SITE_URL }}
          PUBLIC_BASE_PATH: ${{ vars.PUBLIC_BASE_PATH }}
        run: npm run build

      - name: Upload pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4

  ping:
    name: Ping search engines (IndexNow / 百度)
    needs: deploy
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Push URLs
        env:
          SITE_URL: ${{ vars.SITE_URL || 'https://austinxt.github.io' }}
          PUBLIC_BASE_PATH: ${{ vars.PUBLIC_BASE_PATH || '/github-explorer' }}
          INDEXNOW_KEY: ${{ secrets.INDEXNOW_KEY }}
          BAIDU_PUSH_TOKEN: ${{ secrets.BAIDU_PUSH_TOKEN }}
        run: python3 scripts/ping_search_engines.py
        continue-on-error: true
